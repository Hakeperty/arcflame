version: "3.9"
services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    ports:
      - "8000:8000"
    environment:
      - ARCFLARE_MODE=dev
      - ARCFLARE_MODELS_DIR=/models
    volumes:
      - ./models:/models
      # mount the package dir so it lands at /app/arcflare (matches PYTHONPATH=/app)
      - ./orchestrator/src:/app

  node-alpha:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      - ARCFLARE_NODE_NAME=alpha
      - ARCFLARE_GRPC_PORT=9001
      - ARCFLARE_ORCHESTRATOR_HOST=orchestrator
      - ARCFLARE_ORCHESTRATOR_PORT=8000
      - ARCFLARE_ENABLE_RPC=true
      - ARCFLARE_RPC_PORT=10001
    ports:
      - "9001:9001"
      - "10001:10001"
    volumes:
      - ./models:/models
    depends_on: [orchestrator]

  node-beta:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      - ARCFLARE_NODE_NAME=beta
      - ARCFLARE_GRPC_PORT=9002
      - ARCFLARE_ORCHESTRATOR_HOST=orchestrator
      - ARCFLARE_ORCHESTRATOR_PORT=8000
      - ARCFLARE_ENABLE_RPC=true
      - ARCFLARE_RPC_PORT=10002
    ports:
      - "9002:9002"
      - "10002:10002"
    volumes:
      - ./models:/models
    depends_on: [orchestrator]
